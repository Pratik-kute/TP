name: asset_scanner_app
description: Asset Scanner mobile app — V1 UI scaffold (Flutter, Riverpod, go_router).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # Models / serialisation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.20.2
  collection: ^1.18.0
  # Real camera + runtime permissions + temp file path (added in feature-additions Sub-PR 3).
  camera: ^0.10.5+9
  mobile_scanner: ^5.2.3
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
